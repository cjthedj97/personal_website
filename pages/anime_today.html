---
permalink: /tools/anime_today
layout: page
title: Anime Airing Today in the US
---

<div class="anime-page">
  <div id="anime-list" class="anime-main">
    <!-- Anime cards will be injected here -->
  </div>
  <div class="anime-footer">
    <p>Data from Jikan API</p>
  </div>
</div>

<style>
.anime-page {
  font-family: inherit;
  margin: 0;
  padding: 0;
  color: var(--site-text);
}

.anime-page .anime-header {
  text-align: center;
  background: linear-gradient(135deg, var(--site-accent), var(--site-accent-2));
  color: var(--site-heading);
  padding: 10px 0;
}

.anime-page .anime-main {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 1rem;
}

.anime-page .anime-card {
  background: var(--site-surface);
  border: 1px solid var(--site-border);
  border-radius: 1.25rem;
  width: min(100%, 240px);
  padding: 1rem;
  text-align: left;
  backdrop-filter: blur(16px);
  box-shadow: 0 18px 50px rgba(2, 6, 23, 0.18);
}
  
.anime-page .anime-card img {
  width: 100%;
  border-radius: 0.9rem;
  margin: 0.75rem 0;
}
  
.anime-page .anime-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 0.8em;
  color: var(--site-muted);
}

.anime-page .anime-card a {
  color: var(--site-link);
  display: inline-block;
  margin-right: 0.75rem;
  margin-top: 0.5rem;
}
</style>

<script>
// Fetch and display anime airing today
async function fetchAiringAnime() {
  try {
    const response = await fetch('https://api.jikan.moe/v4/seasons/now');
    const data = await response.json();
    const animeList = data.data;
    
    const animeContainer = document.getElementById('anime-list');
    animeContainer.innerHTML = ''; // Clear existing content
    
    animeList.forEach(anime => {
      const animeCard = document.createElement('div');
      animeCard.className = 'anime-card';
      animeCard.innerHTML = `
        <h3>${anime.title}</h3>
        <img src="${anime.images.jpg.large_image_url}" alt="${anime.title}">
        <p>${anime.synopsis.substring(0, 100)}...</p>
        <p><strong>Score:</strong> ${anime.score ? anime.score : 'N/A'}</p>
        <p><strong>Genre:</strong> ${anime.genres.map(g => g.name).join(', ')}</p>
        <p><strong>Status:</strong> ${anime.status}</p>
        <p><strong>Aired:</strong> ${anime.aired.string}</p>
        <a href="${anime.url}" target="_blank">More Info</a>
        ${anime.trailer ? `<a href="${anime.trailer.url}" target="_blank">Watch Trailer</a>` : ''}
      `;
      animeContainer.appendChild(animeCard);
    });
  } catch (error) {
    console.error('Error fetching anime data:', error);
    const animeContainer = document.getElementById('anime-list');
    animeContainer.innerHTML = '<p>Failed to load data, please try again later.</p>';
  }
}

window.onload = fetchAiringAnime;
</script>
